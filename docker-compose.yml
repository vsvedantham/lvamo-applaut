services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: applaut
      POSTGRES_USER: applaut
      POSTGRES_PASSWORD: applaut_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applaut"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # Override DATABASE_URL to use the compose service name, not localhost
      DATABASE_URL: postgresql+asyncpg://applaut:applaut_dev@postgres:5432/applaut
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
